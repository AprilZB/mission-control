<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟办公室 - Mission Control</title>
    <style>
        :root {
            /* 马卡龙等距视角配色 */
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-floor: #0f3460;
            --bg-wall: #1a1a2e;
            
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            
            /* 马卡龙色系 */
            --macaron-pink: #ffb7c5;
            --macaron-blue: #aec6cf;
            --macaron-green: #b8e6d5;
            --macaron-yellow: #fdfd96;
            --macaron-purple: #d7bde2;
            --macaron-orange: #ffdab9;
            
            --accent-pink: #ff8fa3;
            --accent-blue: #6fa3d4;
            --accent-green: #7dd3a0;
            --accent-yellow: #f0e68c;
            --accent-purple: #b19cd9;
            --accent-orange: #ffb380;
            
            --border: #2d4a6f;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, var(--bg-wall) 0%, var(--bg-floor) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 顶部导航栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(22, 33, 62, 0.95);
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px var(--shadow);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, var(--macaron-pink), var(--macaron-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(255, 183, 197, 0.3);
        }

        .logo-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px var(--shadow));
        }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .nav-tab {
            padding: 0.5rem 1.25rem;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--macaron-blue), var(--macaron-purple));
            color: white;
            box-shadow: 0 4px 12px rgba(174, 198, 207, 0.4);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 143, 163, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 143, 163, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 主容器 - 等距视角办公室 */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            padding: 1.5rem;
            min-height: calc(100vh - 80px);
        }

        /* 办公室视图 */
        .office-view {
            background: rgba(22, 33, 62, 0.5);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border);
            position: relative;
            overflow: visible;
            min-height: 600px;
        }

        .office-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 3rem;
            padding: 2rem;
            perspective: 1000px;
        }

        /* 等距视角工位 */
        .desk-container {
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.5s ease;
        }

        .desk-container:hover {
            transform: translateY(-10px) rotateX(5deg);
        }

        .desk {
            position: relative;
            background: linear-gradient(145deg, var(--macaron-blue), var(--macaron-purple));
            border-radius: 20px;
            padding: 2rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
            min-height: 380px;
            box-shadow: 
                0 20px 60px var(--shadow),
                0 0 0 10px rgba(255, 255, 255, 0.05),
                inset 0 2px 10px rgba(255, 255, 255, 0.2);
            transform: rotateX(10deg);
            transform-style: preserve-3d;
        }

        .desk::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 10px;
            right: 10px;
            height: 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.3), transparent);
            border-radius: 50%;
            filter: blur(10px);
        }

        .desk.active {
            background: linear-gradient(145deg, var(--macaron-green), var(--macaron-blue));
            box-shadow: 
                0 20px 60px rgba(125, 211, 160, 0.4),
                0 0 0 10px rgba(125, 211, 160, 0.1),
                inset 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        .desk.busy {
            background: linear-gradient(145deg, var(--macaron-yellow), var(--macaron-orange));
            box-shadow: 
                0 20px 60px rgba(240, 230, 140, 0.4),
                0 0 0 10px rgba(240, 230, 140, 0.1),
                inset 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        .desk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .desk-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            text-shadow: 0 2px 4px var(--shadow);
        }

        .desk-agent {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(5px);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* 悬浮任务卡片 */
        .task-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid var(--accent-blue);
            box-shadow: 0 4px 12px var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .task-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.5));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .task-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .task-card:hover::before {
            opacity: 1;
        }

        .task-card.priority-high {
            border-left-color: var(--accent-pink);
            background: linear-gradient(135deg, #fff5f7, rgba(255, 255, 255, 0.95));
        }

        .task-card.priority-medium {
            border-left-color: var(--accent-yellow);
            background: linear-gradient(135deg, #fffde7, rgba(255, 255, 255, 0.95));
        }

        .task-card.priority-low {
            border-left-color: var(--accent-green);
            background: linear-gradient(135deg, #f0fff4, rgba(255, 255, 255, 0.95));
        }

        .task-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            color: #2d3748;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #718096;
        }

        .task-progress {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 4px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(111, 163, 212, 0.5);
        }

        .progress-text {
            font-size: 0.75rem;
            color: #718096;
            font-weight: 600;
        }

        /* 右侧面板 */
        .sidebar-right {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px var(--shadow);
        }

        .panel-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            letter-spacing: 0.5px;
        }

        .detail-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.875rem;
            line-height: 1.6;
            border: 1px solid var(--border);
        }

        .subtask-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .subtask-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }

        .subtask-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .subtask-checkbox.checked {
            background: linear-gradient(135deg, var(--macaron-green), var(--accent-green));
            border-color: var(--accent-green);
            box-shadow: 0 2px 8px rgba(125, 211, 160, 0.5);
        }

        .subtask-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .subtask-text {
            flex: 1;
            color: var(--text-primary);
        }

        .subtask-text.done {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-floor));
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            border: 2px solid var(--border);
            transform: scale(0.9);
            transition: all 0.3s;
            box-shadow: 0 20px 60px var(--shadow);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: var(--accent-pink);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(111, 163, 212, 0.2);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
            filter: drop-shadow(0 2px 4px var(--shadow));
        }

        .empty-state-text {
            font-size: 1.125rem;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        /* 装饰元素 - 地板网格 */
        .floor-grid {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            transform: perspective(1000px) rotateX(60deg);
            transform-origin: bottom;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .sidebar-right {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- 地板网格装饰 -->
    <div class="floor-grid"></div>

    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🏢</span>
                <span>虚拟办公室</span>
            </div>
            <nav class="nav-tabs">
                <div class="nav-tab active">办公室视图</div>
                <div class="nav-tab">任务看板</div>
                <div class="nav-tab">Agent 管理</div>
                <div class="nav-tab">统计报表</div>
            </nav>
        </div>
        <div class="header-right">
            <button class="btn btn-secondary" onclick="refreshData()">
                🔄 刷新
            </button>
            <button class="btn btn-primary" onclick="showAddTaskModal()">
                ➕ 新建任务
            </button>
            <div class="user-profile" style="display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid var(--border);">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=ZhangBo" alt="用户头像" class="user-avatar" style="width: 32px; height: 32px; border-radius: 50%;">
                <span class="user-name" style="font-size: 0.875rem; font-weight: 500;">ZhangBo</span>
            </div>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 中间区域 - 虚拟办公室 -->
        <main class="office-view">
            <h2 class="panel-title">📋 工作台</h2>
            <div class="office-grid" id="officeGrid">
                <!-- 工位将通过 JS 动态加载 -->
            </div>
        </main>

        <!-- 右侧面板 - 任务详情 -->
        <aside class="sidebar-right">
            <h2 class="panel-title">📝 任务详情</h2>
            <div id="taskDetail">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">点击任务查看详情</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- 添加任务模态框 -->
    <div class="modal-overlay" id="addTaskModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">➕ 创建新任务</h3>
                <button class="modal-close" onclick="hideAddTaskModal()">&times;</button>
            </div>
            <form id="addTaskForm" onsubmit="createTask(event)">
                <div class="form-group">
                    <label class="form-label">任务标题 *</label>
                    <input type="text" class="form-input" id="taskTitle" required placeholder="输入任务标题">
                </div>
                <div class="form-group">
                    <label class="form-label">分配给 Agent *</label>
                    <select class="form-select" id="taskAgent" required>
                        <option value="">选择 Agent</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">优先级</label>
                    <select class="form-select" id="taskPriority">
                        <option value="low">🟢 低</option>
                        <option value="medium" selected>🟡 中</option>
                        <option value="high">🔴 高</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">任务描述</label>
                    <textarea class="form-textarea" id="taskDescription" placeholder="详细描述任务内容..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">项目</label>
                    <select class="form-select" id="taskProject">
                        <option value="default">默认项目</option>
                        <option value="guides">指南</option>
                        <option value="development">开发</option>
                        <option value="research">研究</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="hideAddTaskModal()">取消</button>
                    <button type="submit" class="btn btn-primary">创建任务</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 全局数据
        let agents = [];
        let tasks = [];
        let selectedTask = null;

        // 初始化
        async function init() {
            await loadData();
            renderOffice();
            updateAgentSelect();
            startAutoRefresh();
        }

        // 加载数据
        async function loadData() {
            try {
                // 加载 Tasks
                const tasksRes = await fetch('https://raw.githubusercontent.com/AprilZB/mission-control/master/data/tasks.json');
                if (tasksRes.ok) {
                    const data = await tasksRes.json();
                    tasks = data.tasks || [];
                }
                
                // 加载 Agents
                const agentsRes = await fetch('https://raw.githubusercontent.com/AprilZB/mission-control/master/data/agents.json');
                if (agentsRes.ok) {
                    const data = await agentsRes.json();
                    agents = data.agents || [];
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                useMockData();
            }
        }

        // 模拟数据
        function useMockData() {
            agents = [
                {
                    id: 'main-assistant',
                    name: '主助手',
                    type: 'wecom',
                    status: 'active',
                    avatar: '🤖',
                    capabilities: ['task_management', 'web_search', 'file_operations'],
                    stats: { completed: 15, avgTime: 45, success: 98 }
                },
                {
                    id: 'dev-assistant',
                    name: '开发助手',
                    type: 'local',
                    status: 'busy',
                    avatar: '👨‍💻',
                    capabilities: ['coding', 'debugging', 'testing'],
                    stats: { completed: 42, avgTime: 120, success: 95 }
                },
                {
                    id: 'docs-assistant',
                    name: '文档助手',
                    type: 'local',
                    status: 'idle',
                    avatar: '📝',
                    capabilities: ['documentation', 'summarization'],
                    stats: { completed: 28, avgTime: 30, success: 99 }
                },
                {
                    id: 'research-assistant',
                    name: '研究助手',
                    type: 'local',
                    status: 'offline',
                    avatar: '🔬',
                    capabilities: ['web_search', 'analysis', 'reporting'],
                    stats: { completed: 19, avgTime: 180, success: 92 }
                }
            ];

            tasks = [
                {
                    id: 'task_001',
                    title: '处理客户咨询',
                    description: '自动回复企业微信客户消息',
                    status: 'in_progress',
                    assignedAgent: 'main-assistant',
                    priority: 'high',
                    progress: 60,
                    subtasks: [
                        { id: 'sub_001', title: '读取消息', done: true },
                        { id: 'sub_002', title: '分析意图', done: true },
                        { id: 'sub_003', title: '生成回复', done: false }
                    ]
                },
                {
                    id: 'task_002',
                    title: '代码审查',
                    description: '审查新提交的代码',
                    status: 'in_progress',
                    assignedAgent: 'dev-assistant',
                    priority: 'medium',
                    progress: 30,
                    subtasks: [
                        { id: 'sub_001', title: '检查代码规范', done: true },
                        { id: 'sub_002', title: '性能分析', done: false },
                        { id: 'sub_003', title: '安全审计', done: false }
                    ]
                },
                {
                    id: 'task_003',
                    title: '文档更新',
                    description: '更新 API 文档',
                    status: 'backlog',
                    assignedAgent: 'docs-assistant',
                    priority: 'low',
                    progress: 0,
                    subtasks: []
                }
            ];
        }

        // 渲染办公室视图
        function renderOffice() {
            const container = document.getElementById('officeGrid');
            
            const agentTasks = {};
            agents.forEach(agent => {
                agentTasks[agent.id] = tasks.filter(t => t.assignedAgent === agent.id);
            });

            container.innerHTML = agents.map(agent => {
                const agentTaskList = agentTasks[agent.id] || [];
                const deskClass = agent.status === 'active' ? 'active' : agent.status === 'busy' ? 'busy' : '';
                
                return `
                <div class="desk-container">
                    <div class="desk ${deskClass}">
                        <div class="desk-header">
                            <div class="desk-title">
                                <div class="desk-agent">${agent.avatar || '🤖'}</div>
                                <span>${agent.name}的工位</span>
                            </div>
                            <span class="status-badge">${getStatusText(agent.status)}</span>
                        </div>
                        <div class="task-list">
                            ${agentTaskList.length > 0 ? 
                                agentTaskList.map(task => `
                                    <div class="task-card priority-${task.priority}" onclick="selectTask('${task.id}', event)">
                                        <div class="task-title">${task.title}</div>
                                        <div class="task-meta">
                                            <span>${getPriorityText(task.priority)}</span>
                                            <span>${task.subtasks?.filter(s => s.done).length || 0}/${task.subtasks?.length || 0}</span>
                                        </div>
                                        <div class="task-progress">
                                            <div class="progress-bar">
                                                <div class="progress-fill" style="width: ${task.progress || 0}%"></div>
                                            </div>
                                            <span class="progress-text">${task.progress || 0}%</span>
                                        </div>
                                    </div>
                                `).join('') : 
                                '<div class="empty-state" style="padding: 2rem 0;"><div>暂无任务</div></div>'
                            }
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // 选择任务
        function selectTask(taskId, event) {
            event.stopPropagation();
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            selectedTask = task;
            const agent = agents.find(a => a.id === task.assignedAgent);

            document.getElementById('taskDetail').innerHTML = `
                <div class="detail-section">
                    <div class="detail-title">任务信息</div>
                    <div class="detail-content">
                        <div style="margin-bottom: 1rem;">
                            <strong style="color: var(--text-secondary);">标题:</strong>
                            <div style="margin-top: 0.25rem; color: var(--text-primary);">${task.title}</div>
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <strong style="color: var(--text-secondary);">状态:</strong>
                            <span style="margin-left: 0.5rem; padding: 0.25rem 0.75rem; background: rgba(111, 163, 212, 0.2); color: var(--accent-blue); border-radius: 10px; font-size: 0.75rem;">${task.status}</span>
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <strong style="color: var(--text-secondary);">优先级:</strong>
                            <span style="margin-left: 0.5rem; padding: 0.25rem 0.75rem; background: rgba(255, 143, 163, 0.2); color: var(--accent-pink); border-radius: 10px; font-size: 0.75rem;">${getPriorityText(task.priority)}</span>
                        </div>
                        <div>
                            <strong style="color: var(--text-secondary);">负责 Agent:</strong>
                            <div style="margin-top: 0.25rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text-primary);">
                                <span>${agent?.avatar || '🤖'}</span>
                                <span>${agent?.name || task.assignedAgent}</span>
                            </div>
                        </div>
                    </div>
                </div>

                ${task.description ? `
                <div class="detail-section">
                    <div class="detail-title">任务描述</div>
                    <div class="detail-content" style="color: var(--text-primary);">${task.description}</div>
                </div>
                ` : ''}

                <div class="detail-section">
                    <div class="detail-title">子任务 (${task.subtasks?.filter(s => s.done).length || 0}/${task.subtasks?.length || 0})</div>
                    <div class="subtask-list">
                        ${task.subtasks?.map(sub => `
                            <div class="subtask-item">
                                <div class="subtask-checkbox ${sub.done ? 'checked' : ''}" onclick="toggleSubtask('${task.id}', '${sub.id}')"></div>
                                <div class="subtask-text ${sub.done ? 'done' : ''}">${sub.title}</div>
                            </div>
                        `).join('') || '<div style="color: var(--text-secondary); text-align: center; padding: 1rem;">暂无子任务</div>'}
                    </div>
                </div>

                <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
                    <button class="btn btn-primary" style="flex: 1;" onclick="startTask('${task.id}')">
                        ▶️ 开始任务
                    </button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="completeTask('${task.id}')">
                        ✅ 完成任务
                    </button>
                </div>
            `;
        }

        // 切换子任务状态
        function toggleSubtask(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const subtask = task.subtasks.find(s => s.id === subtaskId);
            if (!subtask) return;

            subtask.done = !subtask.done;
            task.progress = Math.round((task.subtasks.filter(s => s.done).length / task.subtasks.length) * 100);
            
            renderOffice();
            selectTask(taskId, { stopPropagation: () => {} });
        }

        // 显示添加任务模态框
        function showAddTaskModal() {
            document.getElementById('addTaskModal').classList.add('active');
        }

        // 隐藏添加任务模态框
        function hideAddTaskModal() {
            document.getElementById('addTaskModal').classList.remove('active');
            document.getElementById('addTaskForm').reset();
        }

        // 更新 Agent 选择器
        function updateAgentSelect() {
            const select = document.getElementById('taskAgent');
            select.innerHTML = '<option value="">选择 Agent</option>' + 
                agents.map(agent => `
                    <option value="${agent.id}">${agent.avatar || '🤖'} ${agent.name}</option>
                `).join('');
        }

        // 创建任务
        function createTask(event) {
            event.preventDefault();
            
            const newTask = {
                id: 'task_' + Date.now(),
                title: document.getElementById('taskTitle').value,
                assignedAgent: document.getElementById('taskAgent').value,
                priority: document.getElementById('taskPriority').value,
                description: document.getElementById('taskDescription').value,
                project: document.getElementById('taskProject').value,
                status: 'backlog',
                progress: 0,
                subtasks: [],
                createdAt: new Date().toISOString()
            };

            tasks.push(newTask);
            renderOffice();
            hideAddTaskModal();
            
            console.log('创建任务:', newTask);
        }

        // 开始任务
        function startTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.status = 'in_progress';
                renderOffice();
                selectTask(taskId, { stopPropagation: () => {} });
            }
        }

        // 完成任务
        function completeTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.status = 'done';
                task.progress = 100;
                renderOffice();
                selectTask(taskId, { stopPropagation: () => {} });
            }
        }

        // 刷新数据
        function refreshData() {
            loadData();
            renderOffice();
        }

        // 自动刷新
        function startAutoRefresh() {
            setInterval(refreshData, 30000);
        }

        // 辅助函数
        function getStatusText(status) {
            const map = {
                'active': '🟢 工作中',
                'busy': '🟡 忙碌',
                'idle': '🔵 空闲',
                'offline': '🔴 离线'
            };
            return map[status] || status;
        }

        function getPriorityText(priority) {
            const map = {
                'high': '🔴 高',
                'medium': '🟡 中',
                'low': '🟢 低'
            };
            return map[priority] || priority;
        }

        // 当前视图
        let currentView = 'office';

        // 切换视图
        function switchView(viewName) {
            currentView = viewName;
            
            // 更新导航标签状态
            document.querySelectorAll('.nav-tab').forEach((tab, index) => {
                const tabNames = ['office', 'tasks', 'agents', 'stats'];
                if (tabNames[index] === viewName) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            // 渲染对应视图
            const container = document.getElementById('officeGrid');
            if (!container) return;

            if (viewName === 'office') {
                renderOffice();
            } else if (viewName === 'tasks') {
                renderTaskBoard();
            } else if (viewName === 'agents') {
                renderAgentManagement();
            } else if (viewName === 'stats') {
                renderStatsReport();
            }
        }

        // 渲染任务看板
        function renderTaskBoard() {
            const container = document.getElementById('officeGrid');
            const backlogTasks = tasks.filter(t => t.status === 'backlog');
            const inProgressTasks = tasks.filter(t => t.status === 'in_progress');
            const doneTasks = tasks.filter(t => t.status === 'done');

            container.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; height: 100%;">
                    <div class="kanban-column">
                        <div class="kanban-header" style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-weight: 600;">
                            📋 待办 (${backlogTasks.length})
                        </div>
                        <div class="kanban-cards" style="display: flex; flex-direction: column; gap: 0.75rem;">
                            ${backlogTasks.map(task => `
                                <div class="kanban-card" style="background: rgba(255,255,255,0.08); padding: 1rem; border-radius: 12px; cursor: pointer; border: 1px solid var(--border);" onclick="selectTask('${task.id}', event)">
                                    <div style="font-weight: 600; margin-bottom: 0.5rem;">${task.title}</div>
                                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary);">
                                        <span>${getPriorityText(task.priority)}</span>
                                        <span>${task.assignedAgent || '未分配'}</span>
                                    </div>
                                </div>
                            `).join('') || '<div style="color: var(--text-secondary); text-align: center; padding: 2rem;">暂无任务</div>'}
                        </div>
                    </div>
                    <div class="kanban-column">
                        <div class="kanban-header" style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-weight: 600;">
                            🔄 进行中 (${inProgressTasks.length})
                        </div>
                        <div class="kanban-cards" style="display: flex; flex-direction: column; gap: 0.75rem;">
                            ${inProgressTasks.map(task => `
                                <div class="kanban-card" style="background: rgba(255,255,255,0.08); padding: 1rem; border-radius: 12px; cursor: pointer; border: 1px solid var(--border);" onclick="selectTask('${task.id}', event)">
                                    <div style="font-weight: 600; margin-bottom: 0.5rem;">${task.title}</div>
                                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary);">
                                        <span>${getPriorityText(task.priority)}</span>
                                        <span>${task.assignedAgent || '未分配'}</span>
                                    </div>
                                    <div class="task-progress" style="margin-top: 0.75rem;">
                                        <div class="progress-bar" style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
                                            <div class="progress-fill" style="height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); width: ${task.progress || 0}%;"></div>
                                        </div>
                                        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">${task.progress || 0}%</div>
                                    </div>
                                </div>
                            `).join('') || '<div style="color: var(--text-secondary); text-align: center; padding: 2rem;">暂无任务</div>'}
                        </div>
                    </div>
                    <div class="kanban-column">
                        <div class="kanban-header" style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-weight: 600;">
                            ✅ 已完成 (${doneTasks.length})
                        </div>
                        <div class="kanban-cards" style="display: flex; flex-direction: column; gap: 0.75rem;">
                            ${doneTasks.map(task => `
                                <div class="kanban-card" style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; cursor: pointer; border: 1px solid var(--border); opacity: 0.7;" onclick="selectTask('${task.id}', event)">
                                    <div style="font-weight: 600; margin-bottom: 0.5rem; text-decoration: line-through;">${task.title}</div>
                                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary);">
                                        <span>${getPriorityText(task.priority)}</span>
                                        <span>${task.assignedAgent || '未分配'}</span>
                                    </div>
                                </div>
                            `).join('') || '<div style="color: var(--text-secondary); text-align: center; padding: 2rem;">暂无任务</div>'}
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染 Agent 管理
        function renderAgentManagement() {
            const container = document.getElementById('officeGrid');
            
            container.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                    ${agents.map(agent => `
                        <div class="agent-card" style="background: rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border);">
                            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                                <div style="font-size: 3rem;">${agent.avatar || '🤖'}</div>
                                <div>
                                    <div style="font-size: 1.25rem; font-weight: 600;">${agent.name}</div>
                                    <div style="color: var(--text-secondary); font-size: 0.875rem;">${agent.type || 'local'}</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;">
                                ${(agent.capabilities || []).map(cap => `
                                    <span style="padding: 0.25rem 0.75rem; background: rgba(255,255,255,0.1); border-radius: 12px; font-size: 0.75rem;">${cap}</span>
                                `).join('')}
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; text-align: center;">
                                <div style="background: rgba(255,255,255,0.05); padding: 0.75rem; border-radius: 8px;">
                                    <div style="font-size: 1.25rem; font-weight: 600; color: var(--accent-blue);">${agent.stats?.completed || 0}</div>
                                    <div style="font-size: 0.75rem; color: var(--text-secondary);">已完成</div>
                                </div>
                                <div style="background: rgba(255,255,255,0.05); padding: 0.75rem; border-radius: 8px;">
                                    <div style="font-size: 1.25rem; font-weight: 600; color: var(--accent-green);">${agent.stats?.avgTime || 0}m</div>
                                    <div style="font-size: 0.75rem; color: var(--text-secondary);">平均耗时</div>
                                </div>
                                <div style="background: rgba(255,255,255,0.05); padding: 0.75rem; border-radius: 8px;">
                                    <div style="font-size: 1.25rem; font-weight: 600; color: var(--accent-pink);">${agent.stats?.success || 0}%</div>
                                    <div style="font-size: 0.75rem; color: var(--text-secondary);">成功率</div>
                                </div>
                            </div>
                            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 0.875rem; color: var(--text-secondary);">状态：${getStatusText(agent.status)}</span>
                                <button class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.75rem;" onclick="configureAgent('${agent.id}')">⚙️ 配置</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 渲染统计报表
        function renderStatsReport() {
            const container = document.getElementById('officeGrid');
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(t => t.status === 'done').length;
            const inProgressTasks = tasks.filter(t => t.status === 'in_progress').length;
            const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

            const agentStats = agents.map(agent => ({
                name: agent.name,
                avatar: agent.avatar,
                completed: agent.stats?.completed || 0,
                success: agent.stats?.success || 0
            })).sort((a, b) => b.completed - a.completed);

            container.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 2rem;">
                    <!-- 概览卡片 -->
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;">
                        <div style="background: rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem; text-align: center;">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--accent-blue);">${totalTasks}</div>
                            <div style="color: var(--text-secondary); margin-top: 0.5rem;">总任务数</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem; text-align: center;">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--accent-green);">${completedTasks}</div>
                            <div style="color: var(--text-secondary); margin-top: 0.5rem;">已完成</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem; text-align: center;">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--accent-yellow);">${inProgressTasks}</div>
                            <div style="color: var(--text-secondary); margin-top: 0.5rem;">进行中</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem; text-align: center;">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--accent-pink);">${completionRate}%</div>
                            <div style="color: var(--text-secondary); margin-top: 0.5rem;">完成率</div>
                        </div>
                    </div>

                    <!-- Agent 效率排行 -->
                    <div style="background: rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem;">
                        <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">🏆 Agent 效率排行</h3>
                        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                            ${agentStats.map((stat, index) => `
                                <div style="display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: rgba(255,255,255,0.05); border-radius: 12px;">
                                    <div style="font-size: 1.5rem; font-weight: 700; width: 2rem; text-align: center; color: ${index === 0 ? 'var(--accent-yellow)' : index === 1 ? 'var(--text-secondary)' : index === 2 ? 'var(--accent-orange)' : 'var(--text-secondary)'};">${index + 1}</div>
                                    <div style="font-size: 1.5rem;">${stat.avatar}</div>
                                    <div style="flex: 1;">
                                        <div style="font-weight: 600;">${stat.name}</div>
                                        <div style="font-size: 0.75rem; color: var(--text-secondary);">成功率：${stat.success}%</div>
                                    </div>
                                    <div style="font-size: 1.25rem; font-weight: 600; color: var(--accent-blue);">${stat.completed} 任务</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // 配置 Agent（占位函数）
        function configureAgent(agentId) {
            console.log('配置 Agent:', agentId);
            alert('Agent 配置功能开发中...');
        }

        // 绑定导航标签事件
        function bindNavigationEvents() {
            document.querySelectorAll('.nav-tab').forEach((tab, index) => {
                tab.addEventListener('click', () => {
                    const viewNames = ['office', 'tasks', 'agents', 'stats'];
                    switchView(viewNames[index]);
                });
            });
        }

        // 初始化
        async function init() {
            await loadData();
            renderOffice();
            updateAgentSelect();
            startAutoRefresh();
            bindNavigationEvents();
        }

        // 启动应用
        init();
    </script>
</body>
</html>
